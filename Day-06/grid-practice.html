<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            border:2px solid black;
            display:grid;
            height:53.5vh;
            width:20.3vw;
            background-color: rgb(0, 0, 0);
            grid-template-columns: repeat(3,100px);
            grid-template-rows: repeat(4,100px);
            
        }
        .item{
            background-color: rgb(85, 83, 126);
            padding:10px;
            margin-top:10px;
            margin-left:10px;
            color:white;
        }
        #item1{
            grid-column:1/4;
            display:grid;
            place-items: center;
            align-content: center;
            justify-content: center;
            
        }
        #item2{
            grid-row:2/4;
            background-color: rgb(6, 208, 195);
            align-items:center;
            display:flex;
            justify-content: center;
        }
        #item3{
            grid-column:2/4;
            display:grid;
            place-items: center;
            background-color: rgb(33, 33, 225);
        }
        #item4{
            display:grid;
            place-items: center;
            background-color: rgb(33, 33, 225);
        }
         #item5{
            display:grid;
            place-items: center;
            background-color: rgb(33, 33, 225);
        }
        #item6{
            display:grid;
            place-items: center;
            grid-column: 1/4;
            height: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="item1">Header</div>
        <div class="item" id="item2">Sidebar</div>
        <div class="item" id="item3">Content-1</div>
        <div class="item" id="item4">Content-2</div>
        <div class="item" id="item5">Content-3</div>
        <div class="item" id="item6">Footer</div>
    </div>
</body>
</html>
