<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Event Listeners</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
      }

      button {
        padding: 10px 20px;
        margin: 10px;
      }

      input {
        padding: 8px;
        margin: 10px;
      }

      #counter {
        font-size: 30px;
        font-weight: bold;
        margin: 20px;
      }
    </style>
  </head>
  <body>
    <h1 id="heading">JavaScript Event Listeners</h1>

    <button id="btn">Click Me</button>

    <br /><br />

    <input type="text" id="textbox" placeholder="Type Something" />

    <br /><br />

    <form id="myForm">
      <input type="text" placeholder="Enter Name" />
      <button type="submit">Submit</button>
    </form>

    <hr />

    <h2>Increment / Decrement Counter</h2>

    <button id="decrement">-</button>

    <span id="counter">0</span>

    <button id="increment">+</button>

    <script src="event-listers.js"></script>
    <script src="counter.js"></script>
  </body>
</html>
