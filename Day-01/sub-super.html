<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Subscript and Superscript</title>
  </head>
  <body>
    <h1>Subscript Examples</h1>

    <p>H<sub>2</sub>O</p>

    <p>CO<sub>2</sub></p>

    <hr />

    <h1>Superscript Examples</h1>

    <p>x<sup>2</sup></p>

    <p>a<sup>3</sup> + b<sup>3</sup></p>
  </body>
</html>
