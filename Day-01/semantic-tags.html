<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Semantic and Non-Semantic Tags</title>
  </head>
  <body>
    <header>
      <h1>My Website</h1>
    </header>

    <nav>
      <a href="#">Home</a> | <a href="#">About</a> |
      <a href="#">Contact</a>
    </nav>

    <section>
      <article>
        <h2>Semantic Tags</h2>
        <p>Semantic tags describe the purpose of the content.</p>
      </article>
    </section>

    <footer>
      <p>Copyright © 2026</p>
    </footer>

    <hr />

    <div>This is a Div (Non-Semantic Tag)</div>

    <span>This is a Span (Non-Semantic Tag)</span>
  </body>
</html>
