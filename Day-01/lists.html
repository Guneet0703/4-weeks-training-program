<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HTML Lists</title>
  </head>
  <body>
    <h1>Ordered List</h1>

    <ol>
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
      <li>React</li>
    </ol>

    <hr />

    <h1>Unordered List</h1>

    <ul>
      <li>Apple</li>
      <li>Banana</li>
      <li>Mango</li>
      <li>Orange</li>
    </ul>

    <hr />

    <h1>Description List</h1>

    <dl>
      <dt>HTML</dt>
      <dd>HyperText Markup Language</dd>

      <dt>CSS</dt>
      <dd>Cascading Style Sheets</dd>

      <dt>JavaScript</dt>
      <dd>Programming language for web development</dd>
    </dl>
  </body>
</html>
